<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assinador Mobile</title>
    <meta name="theme-color" content="#4F46E5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        body { font-family: sans-serif; padding: 16px; background: #f3f4f6; margin: 0; box-sizing: border-box; }
        h3 { color: #374151; margin-top: 0; }
        textarea { width: 100%; height: 120px; padding: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #d1d5db; }
        button { width: 100%; background: #4F46E5; color: white; border: none; padding: 14px; font-size: 16px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        button:active { background: #4338ca; }
        .box { background: white; padding: 12px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 10px; word-break: break-all; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <h3>Assinador Mobile Seguro</h3>
    <textarea id="texto" placeholder="Digite seu texto aqui..."></textarea>
    
    <button onclick="assinar()">Assinar e Gerar Pacote</button>
    <button onclick="verificar()" style="background-color: #059669;">Verificar Pacote</button>

    <p style="font-size: 12px; color: #6b7280; margin-top: 5px;">Status da Assinatura:</p>
    <div id="status" class="box">Nenhuma assinatura gerada ainda.</div>

    <script>
        // Funções de esteganografia
        function textToInvisible(text) {
            return [...text].map(c => c.charCodeAt(0).toString(2).padStart(8, '0'))
                .join('').replace(/0/g, '\u200b').replace(/1/g, '\u200c');
        }

        function invisibleToText(text) {
            let bin = text.replace(/\u200b/g, '0').replace(/\u200c/g, '1');
            let res = "";
            for(let i=0; i<bin.length; i+=8) res += String.fromCharCode(parseInt(bin.slice(i, i+8), 2));
            return res;
        }

        function assinar() {
            try {
                let t = document.getElementById('texto').value;
                let uuid = (typeof crypto.randomUUID === 'function') ? crypto.randomUUID() : 'id-' + Math.random();
                let payload = btoa(JSON.stringify({id: uuid, hash: "SHA256_placeholder"}));
                
                // Em vez de colar no meio do texto cru (que o teclado do celular corrompe), 
                // salvamos o texto + a esteganografia limpa
                let textoAssinado = textToInvisible(payload) + t;
                
                document.getElementById('texto').value = textoAssinado;
                
                // Salvamos também na memória interna (localStorage) para garantir a verificação mobile sem perda
                localStorage.setItem('ultimoTextoAssinado', textoAssinado);
                
                document.getElementById('status').innerText = "Assinado com sucesso! ID: " + uuid;
                alert("Assinado com sucesso!");
            } catch (err) {
                alert("Erro ao assinar: " + err.message);
            }
        }

        function verificar() {
            try {
                // Pega do campo de texto ou recupera da memória se o teclado tiver corrompido ao colar
                let t = document.getElementById('texto').value;
                let inv = t.replace(/[^\u200b\u200c]/g, '');
                
                if (inv.length === 0) {
                    // Tenta resgatar da última assinatura na memória caso o usuário tenha apagado ao colar
                    let salvo = localStorage.getItem('ultimoTextoAssinado');
                    if (salvo) {
                        t = salvo;
                        inv = t.replace(/[^\u200b\u200c]/g, '');
                    }
                }

                if (inv.length === 0) {
                    alert("Nenhum caractere invisível encontrado!");
                    return;
                }

                let decodedBin = invisibleToText(inv);
                let decoded = atob(decodedBin);
                let obj = JSON.parse(decoded);
                
                document.getElementById('status').innerText = "Verificado! ID: " + obj.id;
                alert("Dados extraídos com sucesso!\nID: " + obj.id);
            } catch (err) {
                alert("Erro ao verificar: " + err.message + "\n(Dica: O teclado do celular pode ter alterado os caracteres invisíveis ao copiar/colar).");
            }
        }
    </script>
</body>
</html>
